<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wellon Snoser Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background: radial-gradient(circle at 50% 0%, #1a1528 0%, #0d0b14 100%);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Задний светящийся фон для эффекта стекла */
        .bg-glow {
            position: fixed;
            width: 300px;
            height: 300px;
            background: #7b2cbf;
            filter: blur(120px);
            border-radius: 50%;
            z-index: -1;
            top: 10%;
            opacity: 0.4;
        }

        /* Стиль Жидкого Стекла (Liquid Glass) */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            margin-bottom: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(45deg, #e0aaff, #c77dff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        /* Блок профиля */
        .profile-section {
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 15px;
            margin-bottom: 15px;
        }

        .avatar {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7b2cbf, #3c096c);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 15px rgba(123, 44, 191, 0.5);
        }

        .user-info h2 {
            font-size: 18px;
            margin-bottom: 4px;
        }

        .user-info p {
            font-size: 13px;
            color: #b3b3b3;
        }

        /* Статусы подписок */
        .status-badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .status-active {
            background: rgba(0, 230, 118, 0.15);
            color: #00e676;
            border: 1px solid rgba(0, 230, 118, 0.3);
            box-shadow: 0 0 10px rgba(0, 230, 118, 0.2);
        }

        .status-inactive {
            background: rgba(255, 23, 68, 0.15);
            color: #ff1744;
            border: 1px solid rgba(255, 23, 68, 0.3);
        }

        /* Инпуты и Кнопки */
        .input-group {
            margin-top: 15px;
        }

        label {
            display: block;
            font-size: 12px;
            color: #aaa;
            margin-bottom: 6px;
            padding-left: 5px;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 14px;
            border-radius: 14px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #c77dff;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 15px rgba(199, 125, 255, 0.2);
        }

        .action-btn {
            width: 100%;
            background: linear-gradient(135deg, #9d4edd 0%, #7b2cbf 100%);
            border: none;
            padding: 15px;
            border-radius: 14px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            margin-top: 20px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 20px rgba(123, 44, 191, 0.4);
        }

        .action-btn:shadow {
            box-shadow: 0 0 25px rgba(157, 78, 221, 0.6);
        }

        .action-btn:active {
            transform: scale(0.98);
        }

        /* Навигация (вкладки) */
        .tabs {
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 400px;
            margin-bottom: 15px;
        }

        .tab {
            flex: 1;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px;
            text-align: center;
            border-radius: 14px;
            font-size: 14px;
            cursor: pointer;
            color: #888;
            transition: 0.3s;
        }

        .tab.active {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.15);
            color: #fff;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="tabs">
        <div class="tab active" id="tab-main" onclick="switchTab('main')">Снос</div>
        <div class="tab" id="tab-profile" onclick="switchTab('profile')">Профиль</div>
    </div>

    <div class="glass-card" id="panel-main">
        <div class="header">
            <h1>WELLON SNOSER</h1>
        </div>
        
        <div class="input-group">
            <label for="target-id">ID или Username цели</label>
            <input type="text" id="target-id" placeholder="@username или 777xxxxxx">
        </div>

        <button class="action-btn" onclick="startSnose()">Запустить атаку</button>
    </div>

    <div class="glass-card" id="panel-profile" style="display: none;">
        <div class="profile-section">
            <div class="avatar" id="user-avatar">?</div>
            <div class="user-info">
                <h2 id="user-name">Пользователь</h2>
                <p id="user-id">ID: не определен</p>
            </div>
        </div>

        <div style="margin-top: 10px;">
            <label>Статус вашей подписки:</label>
            <span class="status-badge status-active" id="sub-status">WELLON PREMIUM</span>
        </div>
    </div>

    <script>
        // Инициализируем Telegram WebApp API
        const tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем на весь экран телефона

        // Подтягиваем данные из ТГ
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            const user = tg.initDataUnsafe.user;
            document.getElementById('user-name').innerText = user.first_name + (user.last_name ? ' ' + user.last_name : '');
            document.getElementById('user-id').innerText = 'ID: ' + user.id;
            if (user.first_name) {
                document.getElementById('user-avatar').innerText = user.first_name.charAt(0).toUpperCase();
            }
        }

        // Переключение между вкладками
        function switchTab(tabName) {
            if (tabName === 'main') {
                document.getElementById('panel-main').style.display = 'block';
                document.getElementById('panel-profile').style.display = 'none';
                document.getElementById('tab-main').classList.add('active');
                document.getElementById('tab-profile').classList.remove('active');
            } else {
                document.getElementById('panel-main').style.display = 'none';
                document.getElementById('panel-profile').style.display = 'block';
                document.getElementById('tab-main').classList.remove('active');
                document.getElementById('tab-profile').classList.add('active');
            }
        }

        // Функция кнопки действия
        function startSnose() {
            const target = document.getElementById('target-id').value;
            if (!target) {
                tg.showAlert('Пожалуйста, введите ID или юзернейм цели!');
                return;
            }
            
            tg.showConfirm(`Вы уверены, что хотите начать снос ${target}?`, function(confirmed) {
                if (confirmed) {
                    // Отправляем данные обратно в бота
                    tg.sendData(JSON.stringify({
                        action: "snose",
                        target: target
                    }));
                    tg.close(); // Закрываем Mini App после отправки данных
                }
            });
        }
    </script>
</body>
</html>
