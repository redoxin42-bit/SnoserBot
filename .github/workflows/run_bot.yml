name: Run Wellon Snoser Bot

on:
  workflow_dispatch: # Позволяет запускать бота вручную кнопкой на GitHub

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-module: '3.11' # Стабильная версия, где всё заведется без проблем

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements.txt

    - name: Start SnoserBot
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }} # Забирает токен из безопасных настроек
      run: |
        python main.py
